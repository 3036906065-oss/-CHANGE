name: WeChat scheduled push

on:
  workflow_dispatch:
    inputs:
      slot:
        description: "Which message to send"
        required: true
        default: "morning"
        type: choice
        options:
          - morning
          - evening
          - both
  schedule:
    # GitHub cron uses UTC. These are Asia/Shanghai times:
    # 07:30 morning push, 18:00 evening push.
    - cron: "30 23 * * *"
    - cron: "0 10 * * *"

permissions:
  contents: read

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TIMEZONE: Asia/Shanghai
      PLAN_START_DATE: "2026-06-01"
      OPENAI_MODEL: gpt-5.4-mini
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
      WECHAT_APP_SECRET: ${{ secrets.WECHAT_APP_SECRET }}
      WECHAT_OPENIDS: ${{ secrets.WECHAT_OPENIDS }}
      WECHAT_TEMPLATE_ID: ${{ secrets.WECHAT_TEMPLATE_ID }}
      WECHAT_TEMPLATE_ID_MORNING: ${{ secrets.WECHAT_TEMPLATE_ID_MORNING }}
      WECHAT_TEMPLATE_ID_EVENING: ${{ secrets.WECHAT_TEMPLATE_ID_EVENING }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send scheduled or manual message
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            case "${{ github.event.schedule }}" in
              "30 23 * * *")
                python -m personal_growth_push send-morning
                ;;
              "0 10 * * *")
                python -m personal_growth_push send-evening
                ;;
              *)
                echo "Unknown schedule: ${{ github.event.schedule }}"
                exit 1
                ;;
            esac
          else
            case "${{ inputs.slot }}" in
              morning)
                python -m personal_growth_push send-morning
                ;;
              evening)
                python -m personal_growth_push send-evening
                ;;
              both)
                python -m personal_growth_push send-morning
                python -m personal_growth_push send-evening
                ;;
            esac
          fi
